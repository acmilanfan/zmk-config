# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Kyria OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_MOUSE=y

# Stabilize connection parameters
CONFIG_BT_CTLR_CONN_PARAM_REQ=y
CONFIG_BT_CTLR_CONN_PARAM_REQ_AUTO=y
CONFIG_BT_GATT_AUTO_RESUBSCRIBE=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTIONS=y

# Avoid broken resume
CONFIG_BT_CTLR_SMP=y

# Force HID reports to restart cleanly
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
CONFIG_ZMK_BLE_PREFER_PERIPHERAL=y

# Prevent stale CCC state
CONFIG_BT_SETTINGS=n
