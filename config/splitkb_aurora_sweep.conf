# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Kyria OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_MOUSE=y

# --- BLE stability fixes for Linux / BlueZ ---
# Force re-subscription of notifications after reconnect
CONFIG_BT_GATT_AUTO_RESUBSCRIBE=y

# Avoid restoring broken CCC state from flash
CONFIG_BT_SETTINGS=n

# Keep BLE bond, do NOT clear on boot
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# Slightly more tolerant connection handling
CONFIG_BT_MAX_CONN=1
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
